# Virall run configuration for ASGSR samples (PRJNA1328788)
# 26 Illumina NovaSeq PE150 DNA samples, human host-filtered

# Input
samples: "nextflow/asgsr_samples.csv"
outdir: "results/ASGSR"                   # set to your output directory

# Databases (auto-set by Docker/Singularity profiles, leave null)
kaiju_db: null
checkv_db: null
genomad_db: null
vog_db: null

# Assembly and mode — DNA viruses from Illumina short reads
assembly_strategy: "auto"
rna_mode: false
metaviral_mode: false
reference: null
reference_only: false

# Host filtering — remove human reads before assembly
host_genome: null                           # e.g. "/path/to/GRCh38.fna"

# Preprocessing
quality_phred: 20
quality_phred_long: 7
min_read_len: 50
min_read_len_long: 1000

# Assembly
flye_min_overlap: 1000
flye_genome_size: null

# Resources (uses defaults from nextflow.config)
threads: 12
memory: "26G"

# Filtering
min_contig_len: 1000

# Quantification
quant_mapq: 20
quant_min_breadth: 0.10

# Single-cell (not used)
single_cell_mode: false
sc_chemistry: "10x_v3"
sc_barcode_whitelist: null
sc_min_reads_per_cell: 100
sc_min_viral_umis: 1
